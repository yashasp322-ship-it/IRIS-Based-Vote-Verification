<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Shield shape -->
  <path d="M50 5 L88 20 L88 52 C88 72 70 88 50 95 C30 88 12 72 12 52 L12 20 Z"
        fill="#0A2342" stroke="#0A2342" stroke-width="2"/>

  <!-- Shield highlight (subtle inner border) -->
  <path d="M50 12 L81 25 L81 52 C81 68 66 82 50 88 C34 82 19 68 19 52 L19 25 Z"
        fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.6"/>

  <!-- Eye white / sclera -->
  <ellipse cx="50" cy="52" rx="18" ry="11" fill="white" opacity="0.95"/>

  <!-- Iris (colored ring) -->
  <circle cx="50" cy="52" r="7" fill="#39FF14"/>

  <!-- Pupil -->
  <circle cx="50" cy="52" r="3.5" fill="#0A2342"/>

  <!-- Pupil highlight -->
  <circle cx="52" cy="50" r="1.2" fill="white" opacity="0.8"/>

  <!-- Eyelid lines (top and bottom curves for the eye shape) -->
  <path d="M32 52 Q50 38 68 52" fill="none" stroke="#0A2342" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32 52 Q50 66 68 52" fill="none" stroke="#0A2342" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Neon green dot accent at top of shield -->
  <circle cx="50" cy="18" r="3" fill="#39FF14" opacity="0.9"/>
</svg>